<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | Secure Panel</title>
    <style>
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            color: white;
        }
        .container {
            text-align: center;
            background: #121212;
            padding: 40px;
            border: 1px solid #333333;
            border-radius: 8px;
            max-width: 350px;
            width: 90%;
        }
        .loader {
            border: 3px solid #333333;
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
            display: none; /* İlk başta gizli */
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .start-btn {
            background-color: #ffffff;
            color: black;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        p { color: #8e8e8e; font-size: 14px; }
    </style>
</head>
<body>

<div class="container" id="panel">
    <h2 id="statusTitle">N4STR0Y Panel</h2>
    <p id="statusText">Sistemi başlatmak için butona dokunun.</p>
    
    <button class="start-btn" id="startBtn">BAĞLANTIYI BAŞLAT</button>
    <div class="loader" id="loader"></div>

    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const btn = document.getElementById('startBtn');
    const audio = document.getElementById('myAudio');
    const loader = document.getElementById('loader');
    const title = document.getElementById('statusTitle');
    const text = document.getElementById('statusText');

    btn.addEventListener('click', function() {
        audio.play(); // Müziği başlatır
        btn.style.display = 'none'; // Butonu gizler
        loader.style.display = 'block'; // Yükleme halkasını gösterir
        title.innerText = "Bağlantı Kuruluyor...";
        text.innerText = "Ses kanalları ve API aktif edildi.";
    });
</script>

</body>
</html>
