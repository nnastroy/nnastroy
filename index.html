<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | SOURCE ACCESS</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #ff0000; }
        
        /* Kamera Görüntüsü Katmanı */
        #videoElement {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 5; opacity: 0; transition: opacity 1s;
            filter: grayscale(100%) brightness(80%) sepia(100%) hue-rotate(-50deg) saturate(600%); /* Kırmızı Hacker Filtresi */
        }

        .container { position: relative; z-index: 30; background: rgba(10, 0, 0, 0.85); padding: 30px; border: 1px solid #ff0000; width: 85%; max-width: 400px; text-align: center; }
        .btn { background: #ff0000; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        #targetOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid red; box-sizing: border-box; z-index: 10;
            display: none; pointer-events: none;
            background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.2) 100%);
        }

        .target-text { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); color: red; font-weight: 900; font-size: 20px; text-shadow: 0 0 10px red; }
    </style>
</head>
<body>

<video id="videoElement" autoplay playsinline></video>
<div id="targetOverlay">
    <div class="target-text">HEDEF BELİRLENDİ: ANALİZ EDİLİYOR...</div>
</div>

<div class="container" id="mainBox">
    <div id="init">
        <p style="font-size: 13px;">SİSTEME GİRİŞ YAPMAK İÇİN BİYOMETRİK DOĞRULAMA GEREKLİ.</p>
        <button class="btn" onclick="startCamera()">DOĞRULAMAYI BAŞLAT</button>
    </div>

    <div id="loading" style="display:none;">
        <p id="statusText">KAMERA ERİŞİMİ SAĞLANIYOR...</p>
        <div style="width: 100%; background: #200; height: 5px; margin-top: 10px;">
            <div id="bar" style="width: 0%; background: red; height: 100%; transition: 0.1s;"></div>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('videoElement');
    const mainBox = document.getElementById('mainBox');

    async function startCamera() {
        try {
            // Kamera izni istiyoruz
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = stream;
            
            // İzin verilince arayüzü değiştir
            document.getElementById('init').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            let w = 0;
            const intr = setInterval(() => {
                w += 1;
                document.getElementById('bar').style.width = w + "%";
                if(w === 50) document.getElementById('statusText').innerText = "YÜZ TARANIYOR...";
                if(w >= 100) {
                    clearInterval(intr);
                    showFace();
                }
            }, 40);

        } catch (err) {
            alert("SİSTEM HATASI: Kamera izni verilmediği için sızma işlemi başarısız oldu.");
        }
    }

    function showFace() {
        mainBox.style.display = 'none'; // Paneli gizle
        video.style.opacity = '1'; // Kamerayı göster
        document.getElementById('targetOverlay').style.display = 'block'; // Hedef yazısını göster
        
        // 5 saniye sonra "imha" kısmına geçebiliriz
        setTimeout(() => {
            alert("VERİLER BULUT SÜRÜCÜYE AKTARILDI.");
            location.reload(); // Şaka biter, sayfayı yeniler
        }, 6000);
    }
</script>
</body>
</html>
