<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADLİ BİLİŞİM PORTALI | N 4 S T R 0 Y</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* GİRİŞ & KAYIT KUTUSU */
        .auth-box { background: #0a0a0a; padding: 40px; border-radius: 10px; border: 1px solid #1a1a1a; width: 350px; text-align: center; z-index: 1000; transition: 0.5s; }
        .auth-box img { width: 60px; margin-bottom: 20px; filter: grayscale(1); }
        input { width: 100%; padding: 12px; margin-top: 10px; background: #050505; border: 1px solid #222; color: #fff; border-radius: 5px; box-sizing: border-box; outline: none; }
        .btn-red { background: #b22222; color: #fff; border: none; padding: 12px; width: 100%; margin-top: 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-link { color: #555; font-size: 11px; margin-top: 15px; cursor: pointer; display: block; text-decoration: underline; }

        /* MATRIX EFEKTİ */
        #matrixCanvas { position: fixed; top: 0; left: 0; display: none; z-index: 2000; }
        #scannerLine { position: fixed; top: -100%; left: 0; width: 100%; height: 10px; background: rgba(0, 255, 0, 0.5); box-shadow: 0 0 20px #0f0; z-index: 2001; display: none; }

        /* OPERASYON PANELİ */
        #opPanel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05080a; display: none; z-index: 3000; flex-direction: column; padding: 20px; box-sizing: border-box; border: 10px solid #0a0c0f; }
        .panel-header { border-bottom: 2px solid #1a2a3a; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; height: 60%; }
        
        #myVideo { width: 100%; border: 1px solid #b22222; border-radius: 5px; filter: contrast(1.5) grayscale(0.3); }
        .log-screen { background: #000; border: 1px solid #1a2a3a; padding: 15px; font-family: monospace; font-size: 12px; color: #3498db; overflow-y: hidden; }

        /* N 4 S T R 0 Y İMZA */
        .admin-footer { margin-top: auto; text-align: center; border-top: 1px solid #1a2a3a; padding-top: 20px; }
        .n4stroy { font-size: 28px; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); letter-spacing: 5px; }
        .law-text { font-size: 10px; color: #b22222; margin-top: 10px; font-weight: bold; letter-spacing: 1px; }

        .loader { border: 2px solid #111; border-top: 2px solid #b22222; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }
    </style>
</head>
<body>

<div class="auth-box" id="loginBox">
    <img src="https://upload.wikimedia.org/wikipedia/tr/6/6e/Emniyet_Genel_M%C3%BCd%C3%BCrl%C3%BC%C4%9F%C3%BC_logosu.png">
    <h3 style="margin:0;">OTURUM AÇ</h3>
    <input type="email" id="loginEmail" placeholder="E-Posta Adresi">
    <input type="password" placeholder="Şifre">
    <button class="btn-red" onclick="tryLogin()">GİRİŞ YAP</button>
    <span class="btn-link" onclick="switchBox('reg')">Sistemde kaydınız yok mu? Kayıt olun.</span>
</div>

<div class="auth-box" id="regBox" style="display:none;">
    <img src="https://upload.wikimedia.org/wikipedia/tr/6/6e/Emniyet_Genel_M%C3%BCd%C3%BCrl%C3%BC%C4%9F%C3%BC_logosu.png">
    <h3 style="margin:0;">YENİ ADLİ KAYIT</h3>
    <input type="email" id="regEmail" placeholder="E-Posta Adresi">
    <input type="password" id="regPass" placeholder="Şifre Belirleyin">
    <button class="btn-red" onclick="startOperation()">KAYIT OL VE BAĞLAN</button>
    <span class="btn-link" onclick="switchBox('login')">Zaten kaydınız var mı? Giriş yapın.</span>
</div>

<canvas id="matrixCanvas"></canvas>
<div id="scannerLine"></div>

<div id="opPanel">
    <div class="panel-header">
        <span style="color:#b22222; font-weight:bold;">ACTIVE OPERATION PANEL // SECURE-LINK</span>
        <span id="liveTime" style="font-family:monospace; color:#555;"></span>
    </div>
    <div class="grid-layout">
        <div>
            <video id="myVideo" autoplay playsinline muted></video>
            <div style="margin-top:10px; font-size:10px; color:#555;">BIOMETRIC SCAN: <span style="color:#0f0;">MATCH %98.4</span></div>
        </div>
        <div class="log-screen" id="logText">> BAĞLANTI KURULUYOR...<br></div>
    </div>
    <div class="admin-footer">
        <div class="n4stroy">N 4 S T R 0 Y</div>
        <div class="law-text">ERİŞİM KAYDI: 5651 SAYILI KANUN GEREĞİNCE LOGLANMIŞTIR. VERİLERİN SİLİNMESİ YASAKTIR.</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');
    let uIP = "192.168.1.1";

    fetch('https://ipapi.co/json/').then(r => r.json()).then(d => uIP = d.ip);

    function switchBox(type) {
        document.getElementById('loginBox').style.display = type === 'login' ? 'block' : 'none';
        document.getElementById('regBox').style.display = type === 'reg' ? 'block' : 'none';
    }

    function tryLogin() {
        const btn = event.target;
        btn.innerHTML = `<div class="loader"></div>Sorgulanıyor...`;
        setTimeout(() => {
            alert("HATA: Bu e-posta adresiyle ilişkili bir adli kayıt bulunamadı. Lütfen yeni kayıt oluşturun.");
            btn.innerHTML = `GİRİŞ YAP`;
        }, 2000);
    }

    function startOperation() {
        const email = document.getElementById('regEmail').value;
        if(!email.includes('@')) { alert("Hata: Geçerli e-posta girin."); return; }
        
        document.getElementById('regBox').style.display = 'none';
        canvas.style.display = 'block';
        initMatrix();
        
        setTimeout(() => {
            document.getElementById('scannerLine').style.display = 'block';
            document.getElementById('scannerLine').style.animation = 'scan 1.5s linear forwards';
            setTimeout(() => {
                canvas.style.display = 'none';
                document.getElementById('scannerLine').style.display = 'none';
                showFinalPanel(email);
            }, 1500);
        }, 10000);
    }

    function initMatrix() {
        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = "0101010101010101ABCDEFHIJKLMNOPRSTUVXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for(let i=0; i<drops.length; i++) {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*fontSize, drops[i]*fontSize);
                if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    }

    async function showFinalPanel(email) {
        document.getElementById('opPanel').style.display = 'flex';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video: true});
            document.getElementById('myVideo').srcObject = stream;
        } catch(e) {}

        const logs = [
            `> HEDEF: ${email}`,
            `> IP: ${uIP}`,
            `> DURUM: TAKİP BAŞLATILDI`,
            `> VERİ ANALİZİ: %100 TAMAMLANDI`,
            `> SİSTEM YÖNETİCİSİ: N 4 S T R 0 Y BAĞLANDI`,
            `> DOSYA MÜHÜRLENDİ.`
        ];

        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('logText').innerHTML += logs[i] + "<br>";
            i++; if(i >= logs.length) clearInterval(interval);
        }, 1500);
    }

    setInterval(() => {
        document.getElementById('liveTime').innerHTML = new Date().toLocaleString();
    }, 1000);
</script>
</body>
</html>
