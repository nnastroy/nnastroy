<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | Instagram Bağlantısı</title>
    <style>
        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            max-width: 350px;
            width: 100%;
        }
        .logo {
            width: 175px;
            margin-bottom: 20px;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3897f0;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #262626; font-size: 18px; margin-bottom: 10px; }
        p { color: #8e8e8e; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_with_gradient.png/11974b40a22d.png" class="logo" alt="Instagram">
    <div class="loader"></div>
    <h2>N4STR0Y Paneli Hazırlanıyor</h2>
    <p>API bağlantısı kuruluyor, lütfen bekleyin...</p>
    <p style="font-size: 12px; margin-top: 20px; color: #dbdbdb;">v1.0.4 Build Mode</p>
</div>

</body>
</html>
