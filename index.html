<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | Matrix Panel</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden; /* Kodların taşmaması için */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Arka plandaki Matrix kodları için Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: none; /* Başlangıçta gizli */
        }

        .container {
            text-align: center;
            background: rgba(18, 18, 18, 0.9); /* Hafif şeffaf yaptık arkası görünsün diye */
            padding: 40px;
            border: 1px solid #00ff41; /* Instagram mavisi yerine Matrix yeşili */
            border-radius: 8px;
            max-width: 350px;
            width: 90%;
            z-index: 10; /* Yazıların kodların üstünde kalması için */
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .start-btn {
            background-color: #00ff41;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 10px #00ff41;
        }

        h2 { color: #00ff41; text-shadow: 0 0 5px #00ff41; }
        p { color: #008f11; font-size: 14px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container" id="panel">
    <h2 id="statusTitle">SYSTEM: N4STR0Y</h2>
    <p id="statusText">Agresif bağlantı için butona dokun...</p>
    
    <button class="start-btn" id="startBtn">BAĞLANTIYI ZORLA</button>

    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('startBtn');
    const audio = document.getElementById('myAudio');
    const title = document.getElementById('statusTitle');
    const text = document.getElementById('statusText');

    // Matrix Efekti Ayarları
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%'\"#&_(),.;:?!\\|{}<>[]^~";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let i = 0; i < columns; i++) drops[i] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    btn.addEventListener('click', function() {
        audio.play();
        btn.style.display = 'none';
        canvas.style.display = 'block'; // Kod yağmurunu başlat
        title.innerText = "SYSTEM CRACKED";
        text.innerText = "Bypass başarılı. Kodlar akıyor...";
        setInterval(drawMatrix, 35); // Hızı buradan ayarlayabilirsin
    });
</script>

</body>
</html>
