<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | FINAL WARNING</title>
    <style>
        body { background-color: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; color: #ff0000; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.2; }
        
        .container { position: relative; z-index: 30; background: rgba(10, 0, 0, 0.95); padding: 30px; border: 1px solid #ff0000; box-shadow: 0 0 25px #ff000044; width: 85%; max-width: 400px; text-align: center; }
        .btn { background: #ff0000; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; letter-spacing: 2px; }
        .loader-bar { width: 0%; height: 2px; background: #ff0000; margin: 15px 0; box-shadow: 0 0 10px #ff0000; }
        
        #choiceArea { display: none; margin-top: 20px; }
        .choice-btn { background: transparent; border: 1px solid #ff0000; color: #ff0000; padding: 10px; width: 48%; cursor: pointer; font-size: 11px; }

        /* Dev Kalın Rakamlar */
        .countdown-text { color: red; font-size: 120px; font-weight: 900; text-shadow: 0 0 30px red; font-family: sans-serif; }

        .shake-forever { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(4px, 4px); }
            25% { transform: translate(-4px, -4px); }
            50% { transform: translate(4px, -4px); }
            75% { transform: translate(-4px, 4px); }
            100% { transform: translate(4px, 4px); }
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container" id="mainBox">
    <div style="border-bottom: 1px solid #ff0000; margin-bottom: 15px; font-size: 12px; text-align: left;">SECURE_SHELL: N4STR0Y</div>
    
    <div id="init">
        <p>SİSTEM ÇEKİRDEĞİNE BAĞLANILSIN MI?</p>
        <button class="btn" onclick="startBruteForce()">BAĞLANTIYI ZORLA</button>
    </div>

    <div id="work" style="display:none;">
        <div id="status" style="font-weight: bold;">OVERRIDING...</div>
        <div class="loader-bar" id="bar"></div>
    </div>

    <div id="choiceArea">
        <p>ERİŞİM TAMAMLANDI.</p>
        <div style="display: flex; justify-content: space-between;">
            <button class="choice-btn" onclick="destructSequence()">İMHA ET</button>
            <button class="choice-btn" onclick="finish('watch')">İZLE</button>
        </div>
    </div>

    <audio id="music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    <audio id="beep"><source src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3" type="audio/mpeg"></audio>
    <audio id="laugh" loop><source src="https://assets.mixkit.co/active_storage/sfx/1042/1042-preview.mp3" type="audio/mpeg"></audio>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const music = document.getElementById('music');
    const beep = document.getElementById('beep');
    const laugh = document.getElementById('laugh');

    canvas.height = window.innerHeight; canvas.width = window.innerWidth;
    const drops = Array(Math.floor(canvas.width/16)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#f00"; ctx.font = "16px arial";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*16, y*16);
            if(y*16 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }

    function playBeep() { beep.currentTime = 0; beep.play(); }

    function startBruteForce() {
        playBeep(); music.play();
        if (navigator.vibrate) { navigator.vibrate(3000); }
        document.getElementById('init').style.display = 'none';
        document.getElementById('work').style.display = 'block';
        setInterval(draw, 50);

        let w = 0;
        const intr = setInterval(() => {
            w += Math.random() * 3;
            if(w >= 100) { w = 100; clearInterval(intr); showFinal(); }
            document.getElementById('bar').style.width = w + "%";
            document.getElementById('status').innerText = "HACKING: %" + Math.floor(w);
        }, 100);
    }

    function showFinal() {
        document.getElementById('work').style.display = 'none';
        document.getElementById('choiceArea').style.display = 'block';
        playBeep();
    }

    function destructSequence() {
        playBeep();
        music.pause(); // Geri sayımda müzik dursun ki ses duyulsun
        canvas.style.display = 'none';
        document.getElementById('mainBox').style.background = 'transparent';
        document.getElementById('mainBox').style.border = 'none';
        document.getElementById('mainBox').style.boxShadow = 'none';
        document.getElementById('choiceArea').style.display = 'none';

        let count = 3;
        // İlk rakam
        document.getElementById('mainBox').innerHTML = `<h1 class="countdown-text">0${count}</h1>`;
        speak(count);

        const countdown = setInterval(() => {
            count--;
            if(count > 0) {
                document.getElementById('mainBox').innerHTML = `<h1 class="countdown-text">0${count}</h1>`;
                speak(count);
                if (navigator.vibrate) { navigator.vibrate(500); }
            } else {
                clearInterval(countdown);
                laugh.play(); // KAHKAHA BAŞLASIN
                document.body.innerHTML = `<div class="shake-forever" style="background:#000; color:#ff0000; width:100vw; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center;">
                    <h1 style="font-family:monospace; letter-spacing:10px; font-size:40px; font-weight:900;">YOU ARE INFECTED</h1>
                    <p style="font-size:15px; margin-top:20px; font-weight:bold;">BYE BYE...</p>
                </div>`;
                
                if (navigator.vibrate) {
                    setInterval(() => { navigator.vibrate(1000); }, 1100);
                }
            }
        }, 1200);
    }

    // Robotik Konuşma Fonksiyonu
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = 0.8;
        msg.pitch = 0.1; // Kalın robot sesi
        window.speechSynthesis.speak(msg);
    }

    function finish(type) {
        playBeep();
        document.body.innerHTML = `<div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999;">
            <iframe width="100%" height="100%" src="https://assets.mixkit.co/videos/preview/mixkit-data-center-server-racks-in-dark-room-4435-large.mp4" style="object-fit:cover;"></iframe>
        </div>`;
    }
</script>
</body>
</html>
