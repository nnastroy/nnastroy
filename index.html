<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N4STR0Y | System Access</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .container {
            text-align: center;
            background: rgba(10, 10, 10, 0.9);
            padding: 40px;
            border: 2px solid #00ff41;
            border-radius: 10px;
            max-width: 380px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        }

        .start-btn {
            background-color: #00ff41;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 0 15px #00ff41;
            transition: 0.3s;
        }

        .start-btn:active { transform: scale(0.95); }

        h2 { color: #00ff41; text-shadow: 0 0 10px #00ff41; margin-bottom: 20px; }
        p { color: #008f11; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container" id="panel">
    <h2 id="statusTitle">SYSTEM: N4STR0Y</h2>
    <p id="statusText">Erişim yetkisi doğrulanıyor...<br>Devam etmek için onay verin.</p>
    
    <button class="start-btn" id="startBtn">SİSTEMİ AÇ</button>

    <audio id="myAudio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>
</div>

<script>
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    const btn = document.getElementById('startBtn');
    const audio = document.getElementById('myAudio');
    const title = document.getElementById('statusTitle');
    const text = document.getElementById('statusText');

    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%#&@";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = [];
    for (let i = 0; i < columns; i++) drops[i] = 1;

    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px arial";
        for (let i = 0; i < drops.length; i++) {
            const char = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(char, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }

    btn.addEventListener('click', function() {
        audio.play();
        btn.style.display = 'none';
        canvas.style.display = 'block';
        
        // Burası istediğin değişikliği yapan kısım
        title.innerText = "HOŞGELDİN MERYEM";
        title.style.fontSize = "24px";
        text.innerHTML = "Erişim başarılı. Tüm protokoller aktif edildi.<br>Sistem senin kontrolünde.";
        
        setInterval(drawMatrix, 35);
    });
</script>

</body>
</html>
